services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daily_truth_brief
      POSTGRES_USER: daily_truth
      POSTGRES_PASSWORD: daily_truth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily_truth -d daily_truth_brief"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://daily_truth:daily_truth@db:5432/daily_truth_brief
      APP_ENV: local
    ports:
      - "8015:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
